name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
      - run: pwsh test/sync-check.ps1
      - run: pwsh test/smoke-test.ps1
