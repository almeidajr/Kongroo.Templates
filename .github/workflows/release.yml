name: release
on:
  push:
    tags: ["v*"]
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet pack Kongroo.Templates.csproj -c Release -o ${{ runner.temp }}/pkg
      # OIDC trusted-publishing steps added in Task 16.
