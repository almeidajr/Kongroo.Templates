repos:
  - repo: local
    hooks:
      - id: csharpier
        name: CSharpier
        entry: dotnet csharpier check .
        language: system
        types_or: [c#]
        pass_filenames: false
      - id: prettier
        name: Prettier
        entry: pnpm exec prettier --check
        language: system
        types_or: [json, yaml, markdown]
      - id: commitlint
        name: commitlint
        entry: pnpm exec commitlint --edit
        language: system
        stages: [commit-msg]
        pass_filenames: false
