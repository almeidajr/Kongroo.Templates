name: release
on:
  push:
    tags: ["v*"]
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet pack -c Release -o ${{ runner.temp }}/pkg
      - uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}
      - run: |
          dotnet nuget push "${{ runner.temp }}/pkg/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
